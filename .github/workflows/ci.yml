name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  rust:
    name: Rust (cargo test + clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sage-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install maturin
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --no-default-features -- -D warnings
      - run: cargo test --no-default-features --lib
      - name: Check ONNX feature compiles
        run: cargo check --no-default-features --features onnx

  rust-features:
    name: Rust (sandbox + ONNX + SMT + tool-executor)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sage-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install maturin
      - uses: dtolnay/rust-toolchain@stable
      - name: Sandbox lib tests (cranelift JIT)
        run: cargo test --no-default-features --features sandbox,cranelift --lib
      - name: SMT verification tests
        run: cargo test --no-default-features --features smt --lib
      - name: Tool executor tests (tree-sitter validator)
        run: cargo test --no-default-features --features tool-executor --lib -- sandbox::validator
      - name: ONNX compile check
        run: cargo check --no-default-features --features onnx
      - name: Integration tests (with Python)
        run: cargo test --no-default-features --features sandbox,cranelift --test '*'

  python-sage:
    name: Python SDK (sage-python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sage-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[all,dev]"
      - run: ruff check src/
      - run: python -m pytest tests/ -v --tb=short

  python-discover:
    name: Python Discovery (sage-discover)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sage-discover
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e "../sage-python[all,dev]"
      - run: pip install -e "."
      - run: python -m pytest tests/ -v --tb=short

  windows:
    name: Windows (Python SDK + Rust check)
    runs-on: windows-latest
    env:
      HF_HUB_OFFLINE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Python SDK
        working-directory: sage-python
        run: pip install -e ".[all,dev]"
      - name: Run Python tests
        working-directory: sage-python
        run: python -m pytest tests/ -v --tb=short -x
      - name: Rust check (no-default-features)
        working-directory: sage-core
        run: cargo check --no-default-features
      - name: Rust check (ONNX feature)
        working-directory: sage-core
        run: cargo check --no-default-features --features onnx
