name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  rust:
    name: Rust (cargo test + clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sage-core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --no-default-features -- -D warnings
      # cargo test skipped: PyO3 extension-module requires Python dev libs
      # linked at test time. Rust logic is tested via Python integration tests.

  python-sage:
    name: Python SDK (sage-python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sage-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[all,dev]"
      - run: ruff check src/
      - run: python -m pytest tests/ -v --tb=short

  python-discover:
    name: Python Discovery (sage-discover)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sage-discover
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e "../sage-python[all,dev]"
      - run: pip install -e "."
      - run: python -m pytest tests/ -v --tb=short
