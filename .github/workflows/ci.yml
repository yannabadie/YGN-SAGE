name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  rust:
    name: Rust (cargo test + clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sage-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install maturin
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --no-default-features -- -D warnings
      - run: cargo test --no-default-features --lib
      - name: ONNX feature tests
        run: cargo test --no-default-features --features onnx --lib

  rust-features:
    name: Rust (sandbox + ONNX + SMT + tool-executor)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sage-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install maturin
      - uses: dtolnay/rust-toolchain@stable
      - name: Sandbox lib tests (cranelift JIT)
        run: cargo test --no-default-features --features sandbox,cranelift --lib
      - name: SMT verification tests
        run: cargo test --no-default-features --features smt --lib
      - name: Tool executor tests (tree-sitter validator)
        run: cargo test --no-default-features --features tool-executor --lib -- sandbox::validator
      - name: Cognitive persistence tests
        run: cargo test --no-default-features --features cognitive --lib
      - name: ONNX feature tests
        run: cargo test --no-default-features --features onnx --lib
      - name: Integration tests (baseline)
        run: cargo test --no-default-features --test '*'
      - name: Integration tests (with Python)
        run: cargo test --no-default-features --features sandbox,cranelift --test '*'

  python-sage:
    name: Python SDK (sage-python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sage-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[all,dev]"
      - run: ruff check src/
      - run: python -m mypy src/sage/ --ignore-missing-imports --no-error-summary
      - run: python -m pytest tests/ -v --tb=short --cov=sage --cov-report=term-missing:skip-covered

  python-discover:
    name: Python Discovery (sage-discover)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sage-discover
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e "../sage-python[all,dev]"
      - run: pip install -e "."
      - run: python -m pytest tests/ -v --tb=short

  windows:
    name: Windows (Python SDK + Rust check)
    runs-on: windows-latest
    env:
      HF_HUB_OFFLINE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Python SDK
        working-directory: sage-python
        run: pip install -e ".[all,dev]"
      - name: Run Python tests
        working-directory: sage-python
        run: python -m pytest tests/ -v --tb=short
      - name: Rust check (no-default-features)
        working-directory: sage-core
        run: cargo check --no-default-features
      - name: Rust unit tests
        working-directory: sage-core
        run: cargo test --no-default-features --lib
      - name: Rust check (ONNX feature)
        working-directory: sage-core
        run: cargo check --no-default-features --features onnx
